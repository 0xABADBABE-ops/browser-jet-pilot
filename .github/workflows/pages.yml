name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - run: npm ci
      - name: Export Mintlify docs
        run: cd docs && npx mint export --output ../site.zip
      - name: Unpack site
        run: unzip site.zip -d site && rm site.zip
      - name: Fix asset paths for GitHub Pages project site
        run: |
          find site -name '*.html' -exec sed -i 's|="/_next/|="/browser-jet-pilot/_next/|g' {} +
          find site -name '*.html' -exec sed -i 's|="/images/|="/browser-jet-pilot/images/|g' {} +
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: 'site'
      - id: deploy
        uses: actions/deploy-pages@v4
