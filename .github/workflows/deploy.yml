name: Build & Deploy to Northflank

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    # Only run when commit message contains [DEPLOY_NF]
    if: contains(github.event.head_commit.message, '[DEPLOY_NF]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: 0xabadbabe/browser-jet-pilot:mcp
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Northflank redeploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.NORTFLANK_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://api.northflank.com/v1/projects/jetty-db-mongo/services/browser-jet-pilot/restart
