name: Release

# ── Required GitHub Secrets ──────────────────────────────────
#
#   NPM_TOKEN               npm access token (publish to npmjs.org)
#   DOCKERHUB_USERNAME      Docker Hub username (push to 0xabadbabe/browser-jet-pilot)
#   DOCKERHUB_TOKEN          Docker Hub access token (or password)
#   NORTHFLANK_API_TOKEN     Northflank API token (trigger redeploy)
#
#   Project: jetty-db-mongo   Service: browser-jet-pilot
#   Image:   0xabadbabe/browser-jet-pilot:mcp (Docker Hub, private)
#
# ── Local Release Flow ───────────────────────────────────────
#
#   1. npm run build              # production build
#   2. git add -A && git commit   # commit everything
#   3. git tag v1.0.2             # create version tag
#   4. git push && git push --tags# push to GitHub
#
#   On tag push, this workflow:
#     test → npm-publish ──────────────────────┐
#          → docker-ghcr (GHCR)                ├─→ github-release
#          → docker-hub (0xabadbabe, tag:mcp) ─┤
#            → northflank-deploy               │
#                                              ┘
# ─────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x', '22.x', '24.x']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  npm-publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-ghcr:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/browser-jet-pilot
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-hub:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: 0xabadbabe/browser-jet-pilot
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=mcp
            type=raw,value=latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  northflank-deploy:
    needs: docker-hub
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Northflank deployment
        run: |
          curl --fail-with-body -X POST \
            "https://api.northflank.com/v1/projects/jetty-db-mongo/services/browser-jet-pilot/deployment" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.NORTHFLANK_API_TOKEN }}" \
            -d '{"external":{"imagePath":"0xabadbabe/browser-jet-pilot:mcp"},"docker":{"configType":"default"}}'

  github-release:
    needs: [npm-publish, docker-ghcr, docker-hub]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Extract the section for this version from CHANGELOG.md
          CONTENT=$(sed -n "/^\[${VERSION}\]/,/^\[/{/^\[/d;p}" CHANGELOG.md)
          # Write to file for multiline support
          echo "$CONTENT" > /tmp/release_notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          generate_release_notes: false
