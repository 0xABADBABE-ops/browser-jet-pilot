services:
  browser-jet-pilot:
    build:
      context: .
      dockerfile: Dockerfile
    image: browser-jet-pilot:local
    container_name: browser-jet-pilot
    ports:
      - '3100:3100'
    environment:
      PORT: '3100'
      HOST: '0.0.0.0'
      LAUNCH: 'true'
      BROWSER_WIDTH: '1280'
      BROWSER_HEIGHT: '720'
      # To connect to an external Chromium instead of launching one:
      # LAUNCH: "false"
      # CDP_URL: "http://host.docker.internal:9222"
    shm_size: '1gb'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS http://localhost:3100/healthz >/dev/null || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
